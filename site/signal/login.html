<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Signal — Login</title>
<link rel="stylesheet" href="/signal/css/design-tokens.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font-serif);
  background: #090b0d; /* projection black — same as jrbnz.com */
  -webkit-font-smoothing: antialiased;
}

.login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: var(--space-6);
}

/* No card — a door, not a dialog */
.login-card {
  width: 100%;
  max-width: 340px;
  text-align: center;
}

.login-brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  margin-bottom: 40px;
}

.login-icon {
  width: 44px;
  height: 44px;
}

.login-wordmark {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  letter-spacing: 0.42em;
  text-indent: 0.42em; /* optically centre the tracked text */
  color: var(--booth-text-1);
  text-transform: uppercase;
  line-height: 1;
}

/* Gold hairline between brand and form */
.login-brand::after {
  content: '';
  width: 32px;
  height: 1px;
  background: var(--color-accent);
  margin-top: 22px;
}

.login-label {
  display: block;
  text-align: left;
  font-size: var(--text-label);
  font-family: var(--font-mono);
  color: var(--booth-text-2);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 9px;
}

.login-input {
  width: 100%;
  background: var(--booth-raised);
  border: 1px solid var(--booth-border-1);
  border-radius: var(--radius-md);
  padding: 11px var(--space-4);
  font-size: var(--text-sm);
  color: var(--booth-text-1);
  font-family: var(--font-mono);
  outline: none;
  transition: border-color var(--transition-base);
}

.login-input:focus {
  border-color: var(--color-accent);
}

.login-submit {
  width: 100%;
  margin-top: var(--space-6);
  height: 44px;
  background: var(--color-accent);
  color: var(--color-accent-fg);
  border: none;
  border-radius: var(--radius-md);
  font-size: var(--text-label);
  font-family: var(--font-mono);
  letter-spacing: 0.18em;
  text-indent: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background var(--transition-base);
}

.login-submit:hover { background: var(--color-accent-bright); }
.login-submit:disabled { opacity: 0.5; cursor: default; }

.login-error {
  margin-top: var(--space-5);
  font-size: var(--text-label);
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
  color: var(--color-danger);
  text-align: center;
  display: none;
}

.login-lockout {
  margin-top: var(--space-5);
  font-size: var(--text-label);
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
  color: var(--booth-text-2);
  text-align: center;
  display: none;
}

.login-build {
  font-family: var(--font-mono);
  font-size: var(--text-label);
  color: var(--booth-text-2);
  letter-spacing: 0.06em;
  opacity: 0.5;
}
</style>
</head>
<body>
<div class="login-screen">
  <div class="login-card">

    <div class="login-brand">
      <img class="login-icon" src="/signal/signal-logo.png" alt="Signal">
      <span class="login-wordmark">Signal</span>
      <span class="login-build" id="login-build"></span>
    </div>

    <form id="login-form">
      <div>
        <label class="login-label" for="password">Password</label>
        <input class="login-input" type="password" id="password" autocomplete="current-password" required autofocus>
      </div>
      <button class="login-submit" type="submit" id="submit-btn">Sign in</button>
      <div class="login-error" id="login-error">Incorrect password. Try again.</div>
      <div class="login-lockout" id="login-lockout"></div>
    </form>

  </div>
</div>
<script type="module">
  import { BUILD } from './js/build.js';
  document.getElementById('login-build').textContent = BUILD;
</script>
<script>
(function () {
  var form = document.getElementById('login-form');
  var btn = document.getElementById('submit-btn');
  var errEl = document.getElementById('login-error');
  var lockoutEl = document.getElementById('login-lockout');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    var pw = document.getElementById('password').value;
    errEl.style.display = 'none';
    lockoutEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      var res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      if (res.ok) {
        window.location.href = '/signal/';
      } else if (res.status === 429) {
        var data = await res.json();
        lockoutEl.textContent = data.error || 'Too many attempts. Please wait.';
        lockoutEl.style.display = 'block';
        btn.disabled = true;
        btn.textContent = 'Sign in';
        if (data.retryAfter) {
          setTimeout(function () {
            btn.disabled = false;
            lockoutEl.style.display = 'none';
          }, data.retryAfter * 1000);
        }
      } else {
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    } catch (err) {
      errEl.textContent = 'Network error. Try again.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });
})();
</script>
</body>
</html>
